document.getElementById('hdr-sub').textContent = 'Unit Lookup · ' + FLEET.length + ' vehicles';

var activeField = 'all';
var qEl = document.getElementById('q');
var resultsEl = document.getElementById('results');
var metaEl = document.getElementById('meta');

document.querySelectorAll('.filter-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    activeField = btn.getAttribute('data-f');
    render();
  });
});

qEl.addEventListener('input', render);

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function hl(text, q) {
  if (!q || !text) return escHtml(text);
  var escaped = escHtml(text);
  var safeQ = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escaped.replace(new RegExp('(' + safeQ + ')', 'gi'), '<mark>$1</mark>');
}

function render() {
  var raw = qEl.value.trim();
  var q = raw.toUpperCase();

  if (!raw) {
    metaEl.textContent = 'Enter a search term above';
    resultsEl.innerHTML = '<div class="empty-state">Search by vehicle number,<br>customer unit, VIN,<br>or customer name</div>';
    return;
  }

  var matches = [];
  for (var i = 0; i < FLEET.length; i++) {
    var r = FLEET[i];
    var vehicle = r[0], custUnit = r[1], custName = r[2], vin = r[3];
    var hit = false;
    if (activeField === 'vehicle')  hit = vehicle.toUpperCase().indexOf(q) >= 0;
    else if (activeField === 'custunit') hit = custUnit.toUpperCase().indexOf(q) >= 0;
    else if (activeField === 'vin')      hit = vin.toUpperCase().indexOf(q) >= 0;
    else if (activeField === 'customer') hit = custName.toUpperCase().indexOf(q) >= 0;
    else hit = vehicle.toUpperCase().indexOf(q) >= 0 || custUnit.toUpperCase().indexOf(q) >= 0 || vin.toUpperCase().indexOf(q) >= 0 || custName.toUpperCase().indexOf(q) >= 0;
    if (hit) matches.push(r);
  }

  metaEl.textContent = matches.length + ' result' + (matches.length !== 1 ? 's' : '') + ' for "' + raw + '"';

  if (!matches.length) {
    resultsEl.innerHTML = '<div class="empty-state">No matches found</div>';
    return;
  }

  var html = '';
  var limit = Math.min(matches.length, 100);
  for (var j = 0; j < limit; j++) {
    var r = matches[j];
    var vehicle = r[0], custUnit = r[1], custName = r[2], vin = r[3], year = r[4], make = r[5], model = r[6], mileage = r[7], miUpdated = r[8];
    var pills = '';
    if (year)  pills += '<span class="pill">' + escHtml(year) + '</span>';
    if (make)  pills += '<span class="pill">' + escHtml(make) + '</span>';
    if (model) pills += '<span class="pill hl">' + escHtml(model) + '</span>';
    html += '<div class="result-card">';
    html += '<div class="row1">';
    html += '<span class="vehicle-num">' + hl(vehicle, raw) + '</span>';
    html += '</div>';
    if (custUnit) html += '<div class="cust-unit-line"><span class="cust-unit-label">Cust #</span>' + hl(custUnit, raw) + '</div>';
    if (custName) html += '<div class="customer-name">' + hl(custName, raw) + '</div>';
    if (vin) html += '<div class="vin-line">VIN: <span class="vin-val">' + hl(vin, raw) + '</span></div>';
    if (mileage) html += '<div class="mileage-line">ODO: <span class="mileage-val">' + escHtml(mileage) + ' mi</span>' + (miUpdated ? '<span style="opacity:0.5;font-size:0.9em"> &middot; ' + escHtml(miUpdated) + '</span>' : '') + '</div>';
    if (pills) html += '<div class="meta-pills">' + pills + '</div>';
    html += '</div>';
  }
  resultsEl.innerHTML = html;
}

render();
qEl.focus();
